name: VIGIL records

on:
  push:
    paths:
      - "vigil/**"
      - ".github/workflows/vigil-records.yml"
  pull_request:
    paths:
      - "vigil/**"
      - ".github/workflows/vigil-records.yml"

permissions:
  contents: write

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Apply runtime-bounded conformance update
        run: python vigil/scripts/apply-runtime-conformance-update.py

      - name: Allow empty evidence arrays in runtime details
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("vigil/scripts/validate-vigil-records.py")
          text = path.read_text(encoding="utf-8")
          old = '        missing = sorted(field for field in required if is_blank(entry.get(field)))\n'
          new = '''        list_fields = {"evidence_urls", "related_patch_ids"}\n        missing = sorted(\n            field\n            for field in required\n            if field not in entry or (field not in list_fields and is_blank(entry.get(field)))\n        )\n'''
          if old not in text:
              raise SystemExit("Runtime detail required-field anchor not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Test VIGIL validator
        run: python vigil/scripts/test_validate_vigil_records.py

      - name: Route VIGIL records
        run: python vigil/scripts/route-vigil-records.py

      - name: Validate VIGIL records
        run: python vigil/scripts/validate-vigil-records.py

      - name: Build VIGIL registry indexes
        run: |
          python vigil/scripts/build-vigil-records.py
          rm -f vigil/VIGIL.ActiveRecords.json vigil/VIGIL.ClosedRecords.json vigil/VIGIL.Records.Index.json vigil/VIGIL.Records.json

      - name: Commit validated runtime-conformance update
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch vigil/VIGIL.ActiveRecords.json vigil/VIGIL.ClosedRecords.json vigil/VIGIL.Records.Index.json vigil/VIGIL.Records.json 2>/dev/null || true
          git add -A vigil .github/workflows/vigil-records.yml
          if git diff --cached --quiet; then
            echo "No VIGIL runtime-conformance changes to commit."
          else
            git commit -m "Add runtime-bounded conformance tracking"
            git push
          fi
