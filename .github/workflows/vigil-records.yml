name: VIGIL records

on:
  push:
    paths:
      - "vigil/**"
      - ".github/workflows/vigil-records.yml"
      - ".gitignore"
  pull_request:
    paths:
      - "vigil/**"
      - ".github/workflows/vigil-records.yml"
      - ".gitignore"

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Reconcile embedded evidence and lifecycle state
        run: |
          if [ -f vigil/records/observations/2026/VIGIL-2026-OBS-0008.json ] || \
             [ -f vigil/records/observations/2026/VIGIL-2026-OBS-0009.json ]; then
            python vigil/scripts/run-vigil-reconciliation.py
          else
            echo "Lifecycle reconciliation already applied."
          fi

      - name: Reconcile current corpus coverage
        run: |
          if [ ! -f vigil/records/patches/2026/VIGIL-2026-PATCH-0020.json ]; then
            python vigil/scripts/reconcile-vigil-corpus-coverage.py
          else
            echo "Corpus coverage reconciliation already applied."
          fi

      - name: Test VIGIL validator
        run: python vigil/scripts/test_validate_vigil_records.py

      - name: Route VIGIL records
        run: python vigil/scripts/route-vigil-records.py

      - name: Validate VIGIL records
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          python vigil/scripts/validate-vigil-records.py > /tmp/vigil-record-validation.log 2>&1
          status=$?
          set -e
          cat /tmp/vigil-record-validation.log
          if [ "$status" -ne 0 ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              {
                echo "### Corpus reconciliation record-validation diagnostic"
                echo
                echo '```text'
                tail -n 180 /tmp/vigil-record-validation.log
                echo '```'
              } > /tmp/vigil-record-validation-comment.md
              gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/vigil-record-validation-comment.md
            fi
            exit "$status"
          fi

      - name: Validate VIGIL lifecycle, corpus coverage, and patch provenance
        run: python vigil/scripts/validate-vigil-lifecycle.py

      - name: Build and enrich VIGIL registry indexes
        run: |
          python vigil/scripts/build-vigil-records.py
          python vigil/scripts/enrich-vigil-indexes.py
          rm -f vigil/VIGIL.ActiveRecords.json vigil/VIGIL.ClosedRecords.json vigil/VIGIL.Records.Index.json vigil/VIGIL.Records.json

      - name: Commit reconciled VIGIL records and generated indexes
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          find vigil -type d -name __pycache__ -prune -exec rm -rf {} +
          find vigil -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          git rm --ignore-unmatch vigil/VIGIL.ActiveRecords.json vigil/VIGIL.ClosedRecords.json vigil/VIGIL.Records.Index.json vigil/VIGIL.Records.json 2>/dev/null || true
          git add vigil
          if git diff --cached --quiet; then
            echo "No reconciled VIGIL changes to commit."
          else
            git commit -m "Reconcile VIGIL corpus coverage and rebuild indexes"
            git push
          fi
