name: VIGIL records

on:
  push:
    paths:
      - "vigil/**"
      - ".github/workflows/vigil-records.yml"
      - ".gitignore"
  pull_request:
    paths:
      - "vigil/**"
      - ".github/workflows/vigil-records.yml"
      - ".gitignore"

concurrency:
  group: vigil-records-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          show-progress: false

      - name: Check out complete Caelestis history
        uses: actions/checkout@v6
        with:
          repository: CAM-Initiative/Caelestis
          path: caelestis
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Fetch Caelestis branches used by active PATCH records
        run: git -C caelestis fetch origin "+refs/heads/*:refs/remotes/origin/*"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Test VIGIL validators
        run: |
          python vigil/scripts/test_validate_vigil_records.py
          python vigil/scripts/test_validate_vigil_lifecycle.py
          python vigil/scripts/test_validate_vigil_patch_trace.py
          python vigil/scripts/test_vigil_provenance_preservation.py
          python vigil/scripts/test_vigil_pipeline_state.py
          python -m unittest discover -s vigil/tests -p 'test_*.py'

      - name: Check VIGIL record routing
        run: python vigil/scripts/route-vigil-records.py --check

      - name: Validate VIGIL records
        run: python vigil/scripts/validate-vigil-records.py

      - name: Validate VIGIL lifecycle, corpus coverage, patch provenance, CAM boundary, and interpretive provenance
        run: python vigil/scripts/run-vigil-lifecycle-validation.py

      - name: Verify literal PATCH wording against Caelestis
        run: python vigil/scripts/validate-vigil-patch-trace.py --caelestis-root caelestis

      - name: Build and enrich VIGIL registry indexes
        run: |
          python vigil/scripts/build-vigil-records.py
          python vigil/scripts/enrich-vigil-indexes.py

      - name: Verify source records and contracts were not mutated
        run: |
          if ! git diff --quiet -- vigil/records vigil/templates vigil/schemas vigil/VIGIL.Schema.json; then
            echo "Validation/build automation modified governed source records or contracts."
            git diff --name-status -- vigil/records vigil/templates vigil/schemas vigil/VIGIL.Schema.json
            exit 1
          fi

      - name: Commit generated VIGIL indexes
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          find vigil -type d -name __pycache__ -prune -exec rm -rf {} +
          find vigil -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          git add \
            vigil/VIGIL.Failures.Index.json \
            vigil/VIGIL.Observations.Index.json \
            vigil/VIGIL.Proposals.Index.json \
            vigil/VIGIL.PatchNotes.Index.json \
            vigil/VIGIL.Registry.Index.json
          if git diff --cached --quiet; then
            echo "No generated VIGIL index changes to commit."
          else
            git commit -m "Rebuild VIGIL registry indexes"
            if ! git push; then
              echo "Branch advanced while this run was building generated files; a newer workflow run owns index generation."
              exit 0
            fi
          fi
