name: VIGIL records

on:
  push:
    paths:
      - "vigil/**"
      - ".github/workflows/vigil-records.yml"
  pull_request:
    paths:
      - "vigil/**"
      - ".github/workflows/vigil-records.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Reconcile embedded evidence and lifecycle state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f vigil/records/observations/2026/VIGIL-2026-OBS-0008.json ] || \
             [ -f vigil/records/observations/2026/VIGIL-2026-OBS-0009.json ]; then
            set +e
            python vigil/scripts/run-vigil-reconciliation.py > /tmp/vigil-reconciliation.log 2>&1
            status=$?
            set -e
            cat /tmp/vigil-reconciliation.log
            if [ "$status" -ne 0 ]; then
              if [ "${{ github.event_name }}" = "pull_request" ]; then
                {
                  echo "### Reconciliation diagnostic"
                  echo
                  echo '```text'
                  tail -n 120 /tmp/vigil-reconciliation.log
                  echo '```'
                } > /tmp/vigil-reconciliation-comment.md
                gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/vigil-reconciliation-comment.md
              fi
              exit "$status"
            fi
          else
            echo "Lifecycle reconciliation already applied."
          fi

      - name: Test VIGIL validator
        run: python vigil/scripts/test_validate_vigil_records.py

      - name: Route VIGIL records
        run: python vigil/scripts/route-vigil-records.py

      - name: Validate VIGIL records
        run: python vigil/scripts/validate-vigil-records.py

      - name: Validate VIGIL lifecycle and patch provenance
        run: python vigil/scripts/validate-vigil-lifecycle.py

      - name: Build VIGIL registry indexes
        run: |
          python vigil/scripts/build-vigil-records.py
          rm -f vigil/VIGIL.ActiveRecords.json vigil/VIGIL.ClosedRecords.json vigil/VIGIL.Records.Index.json vigil/VIGIL.Records.json

      - name: Commit reconciled VIGIL records and generated indexes
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch vigil/VIGIL.ActiveRecords.json vigil/VIGIL.ClosedRecords.json vigil/VIGIL.Records.Index.json vigil/VIGIL.Records.json 2>/dev/null || true
          git add vigil
          if git diff --cached --quiet; then
            echo "No reconciled VIGIL changes to commit."
          else
            git commit -m "Reconcile VIGIL lifecycle and rebuild indexes"
            git push
          fi
